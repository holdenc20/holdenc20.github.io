<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100&display=swap" rel="stylesheet">
</head>

<body>

<div class="main">
  <header> Casey Holden</header>
  <div class="tab">
    <button class="tablinks" onclick="openPage(event, 'about')">About</button>
    <button class="tablinks" onclick="openPage(event, 'portfolio')">Portfolio</button>
    <button class="tablinks" onclick="openPage(event, 'resume')">Resume</button>
    <button class="tablinks" onclick="openPage(event, 'contact')">Contact</button>
  </div>

  <div id="about" class="tabcontent">
    <h1>About</h1>
    <div class="container">
      <h2>Contact info: <br>Email: holden.ca@northeastern.edu<br>Phone Number: 858-500-2543</h2>
      <div class="pictureframe">
          <img src="face-demo.jpg" alt="face pic">
      </div>
    </div>

  </div>


  <div id="portfolio" class="tabcontent">
    <h2>Project 1</h2>
    <div class="container">
      <h2>These are some of the projects I have worked on in class or during my free time.</h2>
      <h1>Maze generator and solver </h1>
    </div>
  </div>

  <div id="resume" class="tabcontent">
    <h2>Project 2</h2>
  </div>

  <div id="contact" class="tabcontent">
    <h2>Project 3</h2>
  </div>
</div>


<script>
openPage(event, 'about');
function openPage(evt, pageName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(pageName).style.display = "block";
  evt.currentTarget.className += " active";
}
</script>

</body>
</html>
