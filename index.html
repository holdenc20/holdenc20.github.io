<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="tab">
  <button class="tablinks" onclick="openPage(event, 'about')">About</button>
  <button class="tablinks" onclick="openPage(event, 'project1')">Project 1</button>
  <button class="tablinks" onclick="openPage(event, 'project2')">Project 2</button>
  <button class="tablinks" onclick="openPage(event, 'project3')">Project 3</button>
</div>

<div id="about" class="tabcontent">
  <h2>About</h2>

  <h3> Hello, I am Casey Holden and 2nd year Computer Science and Computer Engineering major at Northeastern University. I created this page inorder to display the projects I have worked on.</h3>


</div>

<div id="project1" class="tabcontent">
  <h2>Project 1</h2>
</div>

<div id="project2" class="tabcontent">
  <h2>Project 2</h2>
</div>

<div id="project3" class="tabcontent">
  <h2>Project 3</h2>
</div>

<script>
openPage(event, 'about');
function openPage(evt, pageName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(pageName).style.display = "block";
  evt.currentTarget.className += " active";
}
</script>

</body>
</html>
